# Dev-only Honcho v3 validation stack.
#
# Default: fully isolated — its own LiteLLM gateway (repo config, separate
# containers/volumes/network from the v2 memory stack). The prod gateway and
# its spend logs are never touched:
#   docker compose --env-file .env -f deploy/honcho-v3/docker-compose.v3.yml --profile gateway up -d
#
# Opt-in: reuse an already-running LiteLLM gateway on the host instead
# (validate.py then cannot assert routing via the litellm-v3 container logs):
#   HONCHO_V3_LITELLM_BASE_URL=http://host.docker.internal:4000/v1 docker compose --env-file .env -f deploy/honcho-v3/docker-compose.v3.yml up -d
#
# Down:
#   docker compose --env-file .env -f deploy/honcho-v3/docker-compose.v3.yml --profile gateway down

x-honcho-v3-env: &honcho-v3-env
  HONCHO_CONFIG_TOML_DISABLED: "true"
  DB_CONNECTION_URI: postgresql+psycopg://postgres:postgres@honcho-v3-db:5432/postgres
  CACHE_URL: redis://honcho-v3-redis:6379/0?suppress=true
  CACHE_ENABLED: "true"
  AUTH_USE_AUTH: "false"
  LOG_LEVEL: ${HONCHO_V3_LOG_LEVEL:-INFO}
  PERFORMANCE_LOG_FORMAT: compact
  EMBED_MESSAGES: "true"
  EMBEDDING_VECTOR_DIMENSIONS: "1536"
  EMBEDDING_MODEL_CONFIG__TRANSPORT: openai
  EMBEDDING_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_EMBED_MODEL:-embed}
  EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}
  LLM_OPENAI_API_KEY: ${HONCHO_V3_LITELLM_KEY:-${HONCHO_LLM_KEY:-sk-honcho-memory}}

  # v3's OpenAI-compatible runtime is configured per caller. The model names
  # below are LiteLLM route names, not provider-native model ids.
  DERIVER_ENABLED: "true"
  DERIVER_POLLING_SLEEP_INTERVAL_SECONDS: "0.5"
  DERIVER_POLLING_BACKOFF_ENABLED: "false"
  DERIVER_POLLING_STARTUP_JITTER_SECONDS: "0"
  DERIVER_POLLING_JITTER_RATIO: "0"
  DERIVER_FLUSH_ENABLED: "true"
  DERIVER_MODEL_CONFIG__TRANSPORT: openai
  DERIVER_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}
  DERIVER_MODEL_CONFIG__STRUCTURED_OUTPUT_MODE: json_object
  DERIVER_MODEL_CONFIG__MAX_OUTPUT_TOKENS: "4096"

  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}
  DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}
  DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}
  DIALECTIC_LEVELS__max__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}

  SUMMARY_ENABLED: "true"
  SUMMARY_MESSAGES_PER_SHORT_SUMMARY: "10"
  SUMMARY_MESSAGES_PER_LONG_SUMMARY: "20"
  SUMMARY_MODEL_CONFIG__TRANSPORT: openai
  SUMMARY_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}

  DREAM_ENABLED: "true"
  DREAM_DOCUMENT_THRESHOLD: "1"
  DREAM_IDLE_TIMEOUT_MINUTES: "1"
  DREAM_MIN_HOURS_BETWEEN_DREAMS: "1"
  DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT: openai
  DREAM_DEDUCTION_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}
  DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT: openai
  DREAM_INDUCTION_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm-v3:4000/v1}

services:
  honcho-v3-db:
    image: pgvector/pgvector:pg15
    container_name: jarvis-honcho-v3-db
    command: ["postgres", "-c", "max_connections=200"]
    ports:
      - "127.0.0.1:${HONCHO_V3_DB_PORT:-55433}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - honcho-v3-pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  honcho-v3-redis:
    image: redis:8.2
    container_name: jarvis-honcho-v3-redis
    ports:
      - "127.0.0.1:${HONCHO_V3_REDIS_PORT:-56379}:6379"
    volumes:
      - honcho-v3-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm-v3:
    profiles: ["gateway"]
    image: ghcr.io/berriai/litellm:main-stable
    container_name: jarvis-litellm-v3
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      honcho-v3-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HONCHO_V3_LITELLM_PORT:-4001}:4000"
    environment:
      LITELLM_MASTER_KEY: ${HONCHO_V3_LITELLM_KEY:-${HONCHO_LLM_KEY:-sk-honcho-memory}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DATABASE_URL: postgresql://postgres:postgres@honcho-v3-db:5432/litellm
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro

  honcho-v3-api:
    image: ghcr.io/plastic-labs/honcho:v3.0.11
    container_name: jarvis-honcho-v3-api
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      honcho-v3-db:
        condition: service_healthy
      honcho-v3-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HONCHO_V3_API_PORT:-8003}:8000"
    environment: *honcho-v3-env
    healthcheck:
      test:
        ["CMD", "/app/.venv/bin/python", "-c",
         "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 20s

  honcho-v3-deriver:
    image: ghcr.io/plastic-labs/honcho:v3.0.11
    container_name: jarvis-honcho-v3-deriver
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      honcho-v3-api:
        condition: service_healthy
      honcho-v3-db:
        condition: service_healthy
      honcho-v3-redis:
        condition: service_healthy
    environment: *honcho-v3-env

volumes:
  honcho-v3-pgdata:
  honcho-v3-redis-data:

networks:
  default:
    name: jarvis-honcho-v3
