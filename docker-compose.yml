# Jarvis Phase 1 local services. Reads secrets from the root .env file.
#
#   Step 1: litellm                       (LLM gateway)
#   Step 8: honcho-db / honcho-redis /
#           honcho-api / honcho-deriver   (Honcho v3 memory service, spec §4)
#
# Honcho runs in this same compose so its deriver/summary/dream/embedding LLM
# calls reach LiteLLM over the internal network at http://litellm:4000/v1.
# Ports come from .env so Phase 2 (spec §3.1) is an env change, not an edit.

x-honcho-env: &honcho-env
  HONCHO_CONFIG_TOML_DISABLED: "true"
  DB_CONNECTION_URI: postgresql+psycopg://postgres:postgres@honcho-db:5432/postgres
  CACHE_URL: redis://honcho-redis:6379/0?suppress=true
  CACHE_ENABLED: "true"
  AUTH_USE_AUTH: "false"
  LOG_LEVEL: ${HONCHO_V3_LOG_LEVEL:-INFO}
  PERFORMANCE_LOG_FORMAT: compact
  EMBED_MESSAGES: "true"
  EMBEDDING_VECTOR_DIMENSIONS: "1536"
  EMBEDDING_MODEL_CONFIG__TRANSPORT: openai
  EMBEDDING_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_EMBED_MODEL:-embed}
  EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}
  LLM_OPENAI_API_KEY: ${HONCHO_V3_LITELLM_KEY:-${HONCHO_LLM_KEY:-sk-honcho-memory}}

  # Honcho v3 uses OpenAI transport plus a LiteLLM base_url override per model
  # caller. Model names below are LiteLLM route names, not provider-native ids.
  DERIVER_ENABLED: "true"
  DERIVER_POLLING_SLEEP_INTERVAL_SECONDS: "0.5"
  DERIVER_POLLING_BACKOFF_ENABLED: "false"
  DERIVER_POLLING_STARTUP_JITTER_SECONDS: "0"
  DERIVER_POLLING_JITTER_RATIO: "0"
  DERIVER_FLUSH_ENABLED: "true"
  DERIVER_MODEL_CONFIG__TRANSPORT: openai
  DERIVER_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}
  DERIVER_MODEL_CONFIG__STRUCTURED_OUTPUT_MODE: json_object
  DERIVER_MODEL_CONFIG__MAX_OUTPUT_TOKENS: "4096"

  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}
  DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}
  DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}
  DIALECTIC_LEVELS__max__MODEL_CONFIG__TRANSPORT: openai
  DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}

  SUMMARY_ENABLED: "true"
  SUMMARY_MESSAGES_PER_SHORT_SUMMARY: "10"
  SUMMARY_MESSAGES_PER_LONG_SUMMARY: "20"
  SUMMARY_MODEL_CONFIG__TRANSPORT: openai
  SUMMARY_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}

  DREAM_ENABLED: "true"
  DREAM_DOCUMENT_THRESHOLD: "1"
  DREAM_IDLE_TIMEOUT_MINUTES: "1"
  DREAM_MIN_HOURS_BETWEEN_DREAMS: "1"
  DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT: openai
  DREAM_DEDUCTION_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}
  DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT: openai
  DREAM_INDUCTION_MODEL_CONFIG__MODEL: ${HONCHO_V3_LITELLM_CHAT_MODEL:-honcho-llm}
  DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: ${HONCHO_V3_LITELLM_BASE_URL:-http://litellm:4000/v1}

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: jarvis-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${GATEWAY_API_KEY:-sk-jarvis-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Admin UI needs a DB (proxy routing itself does not). Reuses the Postgres
      # instance with a separate `litellm` database.
      DATABASE_URL: postgresql://postgres:postgres@honcho-db:5432/litellm
    depends_on:
      honcho-db:
        condition: service_healthy
    volumes:
      - ./deploy/litellm/config.yaml:/app/config.yaml:ro

  honcho-db:
    image: pgvector/pgvector:pg15
    container_name: jarvis-honcho-db
    command: ["postgres", "-c", "max_connections=200"]
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./deploy/honcho/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - honcho-v3-pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  honcho-redis:
    image: redis:8.2
    container_name: jarvis-honcho-redis
    volumes:
      - honcho-v3-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  honcho-api:
    image: ghcr.io/plastic-labs/honcho:v3.0.11
    container_name: jarvis-honcho-api
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    ports:
      - "${MEMORY_PORT:-8000}:8000"
    environment: *honcho-env
    healthcheck:
      test:
        ["CMD", "/app/.venv/bin/python", "-c",
         "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 20s

  honcho-deriver:
    image: ghcr.io/plastic-labs/honcho:v3.0.11
    container_name: jarvis-honcho-deriver
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      honcho-api:
        condition: service_healthy
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    environment: *honcho-env

volumes:
  honcho-v3-pgdata:
    name: jarvis-honcho-v3-pgdata
  honcho-v3-redis-data:
    name: jarvis-honcho-v3-redis-data
