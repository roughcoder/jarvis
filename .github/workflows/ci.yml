name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync test environment
        run: uv sync --dev --extra gateway --extra tts --extra worker --extra mcp
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Unit tests
        run: uv run pytest tests/unit -q
      - name: Pi installer syntax
        run: bash -n scripts/install_mac.sh scripts/install_pi.sh
