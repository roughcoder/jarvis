name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  conventional-commits:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commits
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
            head_ref="${{ github.event.pull_request.head.sha }}"
          else
            base_ref="${{ github.event.before }}"
            head_ref="${{ github.sha }}"
          fi

          if [[ -z "$base_ref" || "$base_ref" == "0000000000000000000000000000000000000000" ]]; then
            echo "No base commit for comparison; skipping convention check."
            exit 0
          fi

          scripts/check_conventional_commits.sh "$base_ref" "$head_ref"

  python:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync test environment
        run: scripts/sync_runtime_check_env.sh
      - name: Lint
        run: uv run ruff check src/ tests/ scripts/generate_release_notes.py
      - name: Unit tests
        run: uv run pytest tests/unit -q
      - name: Installer syntax
        run: bash -n scripts/install_mac.sh scripts/uninstall_mac.sh scripts/install_pi.sh
